# AndroidX kütüphane desteğini aktif et (Hatayı çözen ana ayar)
android.useAndroidX=true

# Eski kütüphaneleri otomatik olarak AndroidX yapısına dönüştür
android.enableJetifier=true

# Derleme performansını artırmak için bellek ayarı (İsteğe bağlı ama önerilir)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

